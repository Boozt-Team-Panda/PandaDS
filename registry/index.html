<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Panda DS Registry</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:ital,wght@0,300;0,400;0,500;1,400&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
:root{--bg:#f7f6f3;--surface:#ffffff;--border:#e2e0da;--border-strong:#c8c5bc;--text-primary:#1a1917;--text-secondary:#6b6860;--text-tertiary:#9c9a95;--mono:'DM Mono',monospace;--sans:'DM Sans',sans-serif;--sidebar-w:220px;--header-h:56px}
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;background:var(--bg);font-family:var(--sans);color:var(--text-primary);font-size:13px}
.layout{display:grid;grid-template-columns:var(--sidebar-w) 1fr;grid-template-rows:var(--header-h) 1fr;height:100vh;overflow:hidden}
header{grid-column:1/-1;display:flex;align-items:center;justify-content:space-between;padding:0 1.5rem;border-bottom:1px solid var(--border);background:var(--surface);z-index:20}
.header-left{display:flex;align-items:center;gap:1rem}
.wordmark{font-family:var(--mono);font-size:13px;font-weight:500;letter-spacing:0.04em}
.wordmark span{color:var(--text-tertiary)}
.header-stats{display:flex;gap:1.5rem}
.hstat{display:flex;flex-direction:column;align-items:flex-end}
.hstat-val{font-family:var(--mono);font-size:15px;font-weight:500;line-height:1}
.hstat-label{font-size:10px;color:var(--text-tertiary);margin-top:2px;letter-spacing:0.06em;text-transform:uppercase}
.gh-btn{font-family:var(--mono);font-size:11px;color:var(--text-secondary);text-decoration:none;border:1px solid var(--border-strong);border-radius:3px;padding:4px 10px}
.gh-btn:hover{background:var(--bg)}
.updated{font-size:11px;color:var(--text-tertiary);font-family:var(--mono)}
aside{border-right:1px solid var(--border);background:var(--surface);overflow-y:auto;padding:1rem 0}
.nav-section{margin-bottom:1.5rem}
.nav-label{font-size:10px;letter-spacing:0.1em;text-transform:uppercase;color:var(--text-tertiary);padding:0 1rem;margin-bottom:0.5rem;font-family:var(--mono)}
.nav-item{display:flex;align-items:center;justify-content:space-between;padding:6px 1rem;cursor:pointer;border-left:2px solid transparent;transition:all 0.1s}
.nav-item:hover{background:var(--bg)}
.nav-item.active{border-left-color:var(--text-primary);background:var(--bg)}
.nav-item.active .nav-item-label{font-weight:500;color:var(--text-primary)}
.nav-item-label{color:var(--text-secondary);font-size:12px}
.nav-item-count{font-family:var(--mono);font-size:11px;color:var(--text-tertiary);background:var(--bg);border:1px solid var(--border);border-radius:2px;padding:1px 5px;min-width:24px;text-align:center}
.nav-item.active .nav-item-count{background:var(--text-primary);color:#fff;border-color:var(--text-primary)}
.session-dot{width:7px;height:7px;border-radius:50%;margin-right:8px;flex-shrink:0}
main{overflow-y:auto;background:var(--bg)}
.main-inner{padding:1.5rem;max-width:1100px}
.page-header{display:flex;align-items:baseline;justify-content:space-between;margin-bottom:1.25rem;padding-bottom:1rem;border-bottom:1px solid var(--border)}
.page-title{font-size:18px;font-weight:600;letter-spacing:-0.02em}
.page-subtitle{font-size:12px;color:var(--text-tertiary);font-family:var(--mono)}
.filter-row{display:flex;gap:6px;margin-bottom:1rem;flex-wrap:wrap;align-items:center}
.filter-label{font-size:11px;color:var(--text-tertiary);font-family:var(--mono);margin-right:2px}
.fbtn{font-size:11px;font-family:var(--mono);padding:3px 9px;border:1px solid var(--border);border-radius:2px;cursor:pointer;background:var(--surface);color:var(--text-secondary);transition:all 0.1s}
.fbtn:hover{border-color:var(--border-strong)}
.fbtn.active{background:var(--text-primary);color:#fff;border-color:var(--text-primary)}
.filter-sep{width:1px;height:16px;background:var(--border);margin:0 4px;align-self:center}
.tbl-wrap{background:var(--surface);border:1px solid var(--border);border-radius:4px;overflow:hidden}
table{width:100%;border-collapse:collapse;font-size:12px;table-layout:fixed}
thead{border-bottom:1px solid var(--border);background:var(--bg)}
th{text-align:left;font-size:10px;letter-spacing:0.08em;text-transform:uppercase;color:var(--text-tertiary);padding:8px 12px;font-family:var(--mono);font-weight:400}
td{padding:9px 12px;border-bottom:1px solid var(--border);vertical-align:top}
tr:last-child td{border-bottom:none}
tr.row-main:hover{background:#fafaf8;cursor:pointer}
tr.row-expand td{background:#fafaf8;padding:10px 12px 14px;border-bottom:1px solid var(--border)}
.expand-body{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.expand-field{display:flex;flex-direction:column;gap:3px}
.expand-field.full{grid-column:1/-1}
.expand-key{font-size:10px;letter-spacing:0.08em;text-transform:uppercase;color:var(--text-tertiary);font-family:var(--mono)}
.expand-val{font-size:12px;color:var(--text-secondary);line-height:1.5}
.id-chip{font-family:var(--mono);font-size:11px;font-weight:500;white-space:nowrap;letter-spacing:0.02em}
.sbadge{display:inline-flex;align-items:center;font-family:var(--mono);font-size:10px;font-weight:500;padding:2px 6px;border-radius:2px;white-space:nowrap}
.status{display:inline-block;font-family:var(--mono);font-size:10px;padding:2px 7px;border-radius:2px;letter-spacing:0.04em;font-weight:500;white-space:nowrap}
.st-stable{background:#dcfce7;color:#15803d}
.st-draft{background:#fef9c3;color:#a16207}
.st-blocked{background:#fee2e2;color:#b91c1c}
.st-unverified{background:#ede9fe;color:#6d28d9}
.st-tbd{background:#f3f4f6;color:#6b7280;border:1px solid #e5e7eb}
.st-open{background:#dbeafe;color:#1d4ed8}
.st-unresolved{background:#fee2e2;color:#b91c1c}
.st-resolved{background:#dcfce7;color:#15803d}
.pri{display:inline-block;font-family:var(--mono);font-size:10px;padding:2px 7px;border-radius:2px;font-weight:500}
.pr-high{background:#fee2e2;color:#b91c1c}
.pr-med{background:#fef9c3;color:#a16207}
.pr-low{background:#f3f4f6;color:#6b7280}
.stmt{color:var(--text-primary);line-height:1.5;white-space:normal}
.layer-tag{font-size:10px;font-family:var(--mono);color:var(--text-tertiary);margin-top:2px}
.empty-state{text-align:center;padding:3rem;color:var(--text-tertiary);font-family:var(--mono);font-size:12px}
.sessions-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:12px}
.session-card{background:var(--surface);border:1px solid var(--border);border-radius:4px;padding:1.25rem}
.sc-header{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:0.75rem}
.sc-id{font-family:var(--mono);font-size:22px;font-weight:300}
.sc-date{font-family:var(--mono);font-size:11px;color:var(--text-tertiary)}
.sc-topic{font-size:13px;font-weight:500;line-height:1.4;margin-bottom:0.75rem}
.sc-stats{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;border-top:1px solid var(--border);padding-top:0.75rem;margin-top:0.5rem}
.sc-stat{display:flex;flex-direction:column;gap:2px}
.sc-stat-val{font-family:var(--mono);font-size:16px;font-weight:500}
.sc-stat-key{font-size:10px;color:var(--text-tertiary);letter-spacing:0.06em;text-transform:uppercase}
.sc-attendees{font-size:11px;color:var(--text-secondary);line-height:1.5}
.notice{background:#fffbeb;border:1px solid #fde68a;border-radius:4px;padding:8px 12px;font-size:11px;color:#92400e;margin-bottom:12px;font-family:var(--mono)}
.error-box{background:#fee2e2;border:1px solid #fca5a5;border-radius:4px;padding:1rem;font-size:12px;color:#991b1b;margin:1rem}
.loading{display:flex;align-items:center;justify-content:center;height:200px;font-family:var(--mono);font-size:12px;color:var(--text-tertiary)}
::-webkit-scrollbar{width:5px;height:5px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:var(--border-strong);border-radius:99px}
</style>
</head>
<body>
<div class="layout">
  <header>
    <div class="header-left">
      <div class="wordmark">PANDA<span>/</span>DS <span>·</span> Registry</div>
      <span class="updated" id="h-updated">—</span>
    </div>
    <div class="header-stats" id="h-stats"></div>
    <a class="gh-btn" href="https://github.com/Boozt-Team-Panda/PandaDS" target="_blank">↗ GitHub</a>
  </header>
  <aside>
    <div class="nav-section">
      <div class="nav-label">Views</div>
      <div class="nav-item active" data-tab="decisions" onclick="switchTab(this)"><span class="nav-item-label">Decisions</span><span class="nav-item-count" id="nc-decisions">—</span></div>
      <div class="nav-item" data-tab="open" onclick="switchTab(this)"><span class="nav-item-label">Open threads</span><span class="nav-item-count" id="nc-open">—</span></div>
      <div class="nav-item" data-tab="conflicts" onclick="switchTab(this)"><span class="nav-item-label">Conflicts</span><span class="nav-item-count" id="nc-conflicts">—</span></div>
      <div class="nav-item" data-tab="assumptions" onclick="switchTab(this)"><span class="nav-item-label">Assumptions</span><span class="nav-item-count" id="nc-assumptions">—</span></div>
      <div class="nav-item" data-tab="deferred" onclick="switchTab(this)"><span class="nav-item-label">Deferred</span><span class="nav-item-count" id="nc-deferred">—</span></div>
      <div class="nav-item" data-tab="sessions" onclick="switchTab(this)"><span class="nav-item-label">Sessions</span><span class="nav-item-count" id="nc-sessions">—</span></div>
    </div>
    <div class="nav-section" id="session-nav"><div class="nav-label">Sessions</div></div>
  </aside>
  <main><div class="main-inner" id="main-content"><div class="loading">Loading registry…</div></div></main>
</div>
<script>
let D=null,activeTab='decisions',expandedRow=null,filterSession='all',filterStatus='all';
function sessColor(id){const p={S1:'#3b82f6',S2:'#ec4899',S3:'#22c55e'};if(p[id])return p[id];const h=[280,40,180,320,60,200,0,120,260];const i=parseInt(id.replace('S',''),10)-1;return`hsl(${h[i%h.length]},65%,45%)`}
async function init(){try{const r=await fetch('./panda-registry.json');if(!r.ok)throw new Error(`HTTP ${r.status}`);D=await r.json();}catch(e){document.getElementById('main-content').innerHTML=`<div class="error-box"><strong>Could not load panda-registry.json</strong><br>Ensure it is in the same folder and served via a web server (not file://).<br><br>Error: ${e.message}</div>`;return;}bootstrap();}
function bootstrap(){buildNav();updateCounts();updateHeader();renderTab();}
function buildNav(){const nav=document.getElementById('session-nav');D.sessions.forEach(s=>{const col=sessColor(s.id);const d=document.createElement('div');d.className='nav-item';d.style.cursor='default';d.innerHTML=`<div style="display:flex;align-items:center"><div class="session-dot" style="background:${col}"></div><span class="nav-item-label" style="font-size:11px">${s.id} · ${String(s.date).slice(0,7)}</span></div><span class="nav-item-count" style="font-size:10px">${s.decisions}</span>`;nav.appendChild(d);});}
function updateCounts(){['decisions','open','conflicts','assumptions','deferred','sessions'].forEach(k=>{const map={decisions:D.decisions,open:D.openThreads,conflicts:D.conflicts,assumptions:D.assumptions,deferred:D.deferred,sessions:D.sessions};document.getElementById('nc-'+k).textContent=map[k].length;});}
function updateHeader(){document.getElementById('h-updated').textContent=`v${D.meta.version} · ${D.meta.lastUpdated}`;const stable=D.decisions.filter(d=>d.status==='stable').length;const highOpn=D.openThreads.filter(o=>o.priority==='high').length;const unres=D.conflicts.filter(c=>c.resolutionStatus==='unresolved').length;document.getElementById('h-stats').innerHTML=`<div class="hstat"><div class="hstat-val">${D.decisions.length}</div><div class="hstat-label">Decisions</div></div><div class="hstat"><div class="hstat-val">${stable}</div><div class="hstat-label">Stable</div></div><div class="hstat"><div class="hstat-val">${highOpn}</div><div class="hstat-label">High OPN</div></div><div class="hstat"><div class="hstat-val">${unres}</div><div class="hstat-label">Conflicts</div></div>`;}
function switchTab(el){document.querySelectorAll('.nav-item[data-tab]').forEach(x=>x.classList.remove('active'));el.classList.add('active');activeTab=el.dataset.tab;expandedRow=null;filterSession='all';filterStatus='all';renderTab();}
function renderTab(){const map={decisions:renderDecisions,open:renderOpen,conflicts:renderConflicts,assumptions:renderAssumptions,deferred:renderDeferred,sessions:renderSessions};document.getElementById('main-content').innerHTML=(map[activeTab]||renderDecisions)();}
function sb(s){const col=sessColor(s);const r=parseInt(col.slice(1,3)||'60',16);const light=`hsl(${hueFromColor(col)},80%,93%)`;const dark=`hsl(${hueFromColor(col)},60%,30%)`;return`<span class="sbadge" style="background:${light};color:${dark}">${s}</span>`;}
function hueFromColor(c){if(c.startsWith('hsl'))return c.match(/\d+/)[0];const map={'#3b82f6':217,'#ec4899':330,'#22c55e':142};return map[c]||180;}
function stB(s){const l={stable:'Stable',draft:'Draft',blocked:'Blocked',unverified:'⚠ Unverified',tbd:'TBD',open:'Open',unresolved:'Unresolved',resolved:'Resolved'};return`<span class="status st-${s}">${l[s]||s}</span>`;}
function priB(p){return`<span class="pri pr-${p}">${p}</span>`;}
function fBar(opts){const sess=['all',...D.sessions.map(s=>s.id)];return`<div class="filter-row"><span class="filter-label">session</span>${sess.map(s=>`<button class="fbtn${filterSession===s?' active':''}" onclick="setFS('${s}')">${s==='all'?'All':s}</button>`).join('')}${opts?`<div class="filter-sep"></div><span class="filter-label">status</span>${opts.map(s=>`<button class="fbtn${filterStatus===s?' active':''}" onclick="setFSt('${s}')">${s==='all'?'All':s}</button>`).join('')}`:''}</div>`;}
function setFS(s){filterSession=s;expandedRow=null;renderTab();}
function setFSt(s){filterStatus=s;expandedRow=null;renderTab();}
function tog(k){expandedRow=expandedRow===k?null:k;renderTab();}
function renderDecisions(){let items=D.decisions.filter(d=>filterSession==='all'||d.session===filterSession);if(filterStatus!=='all')items=items.filter(d=>d.status===filterStatus);const rows=items.map(d=>{const k='d'+d.id,exp=expandedRow===k;return`<tr class="row-main" onclick="tog('${k}')"><td style="width:105px"><span class="id-chip">${d.id}</span></td><td style="width:52px">${sb(d.session)}</td><td><div class="stmt">${d.statement}</div><div class="layer-tag">${d.layer}</div></td><td style="width:100px;text-align:right">${stB(d.status)}</td></tr>${exp?`<tr class="row-expand"><td colspan="4"><div class="expand-body"><div class="expand-field full"><div class="expand-key">Context</div><div class="expand-val">${d.context||'—'}</div></div><div class="expand-field"><div class="expand-key">Date</div><div class="expand-val">${d.date}</div></div><div class="expand-field"><div class="expand-key">Layer</div><div class="expand-val">${d.layer}</div></div></div></td></tr>`:''}`}).join('');return`<div class="page-header"><div><div class="page-title">Decisions</div><div class="page-subtitle">${items.length} of ${D.decisions.length} entries</div></div></div>${fBar(['all','stable','draft','unverified','blocked'])}<div class="tbl-wrap"><table><thead><tr><th style="width:105px">ID</th><th style="width:52px">Sess</th><th>Statement</th><th style="width:100px;text-align:right">Status</th></tr></thead><tbody>${rows||`<tr><td colspan="4" class="empty-state">No results</td></tr>`}</tbody></table></div>`;}
function renderOpen(){let items=D.openThreads.filter(o=>filterSession==='all'||o.session===filterSession);if(filterStatus!=='all')items=items.filter(o=>o.priority===filterStatus);const rows=items.map(o=>{const k='o'+o.id,exp=expandedRow===k;return`<tr class="row-main" onclick="tog('${k}')"><td style="width:105px"><span class="id-chip">${o.id}</span></td><td style="width:52px">${sb(o.session)}</td><td><div class="stmt">${o.topic}</div><div class="layer-tag">${o.layer}</div></td><td style="width:70px">${priB(o.priority)}</td><td style="width:80px;text-align:right">${stB(o.status)}</td></tr>${exp?`<tr class="row-expand"><td colspan="5"><div class="expand-body"><div class="expand-field full"><div class="expand-key">Last position</div><div class="expand-val">${o.lastPosition}</div></div><div class="expand-field full"><div class="expand-key">Needs</div><div class="expand-val">${o.needs}</div></div><div class="expand-field"><div class="expand-key">Blocks</div><div class="expand-val">${o.blocks}</div></div></div></td></tr>`:''}`}).join('');return`<div class="page-header"><div><div class="page-title">Open threads</div><div class="page-subtitle">${items.length} of ${D.openThreads.length} entries</div></div></div>${fBar(['all','high','med','low'])}<div class="tbl-wrap"><table><thead><tr><th style="width:105px">ID</th><th style="width:52px">Sess</th><th>Topic</th><th style="width:70px">Priority</th><th style="width:80px;text-align:right">Status</th></tr></thead><tbody>${rows||`<tr><td colspan="5" class="empty-state">No results</td></tr>`}</tbody></table></div>`;}
function renderConflicts(){let items=D.conflicts.filter(c=>filterSession==='all'||c.session===filterSession);const rows=items.map(c=>{const k='c'+c.id,exp=expandedRow===k;return`<tr class="row-main" onclick="tog('${k}')"><td style="width:105px"><span class="id-chip">${c.id}</span></td><td style="width:52px">${sb(c.session)}</td><td><div class="stmt">${c.topic}</div></td><td style="width:110px;text-align:right">${stB(c.resolutionStatus)}</td></tr>${exp?`<tr class="row-expand"><td colspan="4"><div class="expand-body"><div class="expand-field full"><div class="expand-key">Previous decision</div><div class="expand-val">${c.previousDecision}</div></div><div class="expand-field full"><div class="expand-key">Current direction</div><div class="expand-val">${c.currentDirection}</div></div><div class="expand-field"><div class="expand-key">If keep old</div><div class="expand-val">${c.implKeepOld}</div></div><div class="expand-field"><div class="expand-key">If go new</div><div class="expand-val">${c.implGoNew}</div></div><div class="expand-field full"><div class="expand-key">Notes</div><div class="expand-val">${c.notes}</div></div></div></td></tr>`:''}`}).join('');return`<div class="page-header"><div><div class="page-title">Conflicts</div><div class="page-subtitle">${items.length} of ${D.conflicts.length} entries</div></div></div>${fBar()}<div class="tbl-wrap"><table><thead><tr><th style="width:105px">ID</th><th style="width:52px">Sess</th><th>Topic</th><th style="width:110px;text-align:right">Status</th></tr></thead><tbody>${rows||`<tr><td colspan="4" class="empty-state">No conflicts on record</td></tr>`}</tbody></table></div>`;}
function renderAssumptions(){let items=D.assumptions.filter(a=>filterSession==='all'||a.session===filterSession);const rows=items.map(a=>{const k='a'+a.id,exp=expandedRow===k;return`<tr class="row-main" onclick="tog('${k}')"><td style="width:105px"><span class="id-chip">${a.id}</span></td><td style="width:52px">${sb(a.session)}</td><td><div class="stmt">${a.statement}</div></td><td style="width:80px;text-align:right">${stB(a.status)}</td></tr>${exp?`<tr class="row-expand"><td colspan="4"><div class="expand-body"><div class="expand-field full"><div class="expand-key">Risk if wrong</div><div class="expand-val">${a.risk}</div></div></div></td></tr>`:''}`}).join('');return`<div class="page-header"><div><div class="page-title">Assumptions</div><div class="page-subtitle">${items.length} of ${D.assumptions.length} entries</div></div></div>${fBar()}<div class="tbl-wrap"><table><thead><tr><th style="width:105px">ID</th><th style="width:52px">Sess</th><th>Statement</th><th style="width:80px;text-align:right">Status</th></tr></thead><tbody>${rows}</tbody></table></div>`;}
function renderDeferred(){let items=D.deferred.filter(d=>filterSession==='all'||d.session===filterSession);const rows=items.map(d=>{const k='df'+d.id,exp=expandedRow===k;return`<tr class="row-main" onclick="tog('${k}')"><td style="width:105px"><span class="id-chip">${d.id}</span></td><td style="width:52px">${sb(d.session)}</td><td><div class="stmt">${d.topic}</div></td><td style="white-space:normal"><div class="expand-val">${d.revisit}</div></td></tr>${exp?`<tr class="row-expand"><td colspan="4"><div class="expand-body"><div class="expand-field full"><div class="expand-key">Reason</div><div class="expand-val">${d.reason}</div></div></div></td></tr>`:''}`}).join('');return`<div class="page-header"><div><div class="page-title">Deferred</div><div class="page-subtitle">${items.length} of ${D.deferred.length} entries</div></div></div>${fBar()}<div class="tbl-wrap"><table><thead><tr><th style="width:105px">ID</th><th style="width:52px">Sess</th><th>Topic</th><th>Revisit when</th></tr></thead><tbody>${rows}</tbody></table></div>`;}
function renderSessions(){const hasN=D.sessions.some(s=>s.notes);const cards=D.sessions.map(s=>{const col=sessColor(s.id);return`<div class="session-card" style="border-top:3px solid ${col}"><div class="sc-header"><div class="sc-id" style="color:${col}">${s.id}</div><div class="sc-date">${s.date}</div></div><div class="sc-topic">${s.topic}</div><div class="sc-attendees">${s.attendees.join(', ')}${s.notes?` <span style="color:#a16207">· ${s.notes}</span>`:''}</div><div class="sc-stats"><div class="sc-stat"><div class="sc-stat-val">${s.decisions}</div><div class="sc-stat-key">Decisions</div></div><div class="sc-stat"><div class="sc-stat-val">${s.openThreads}</div><div class="sc-stat-key">Open</div></div><div class="sc-stat"><div class="sc-stat-val">${s.conflicts}</div><div class="sc-stat-key">Conflicts</div></div></div></div>`}).join('');return`<div class="page-header"><div><div class="page-title">Sessions</div><div class="page-subtitle">${D.sessions.length} sessions on record</div></div></div>${hasN?`<div class="notice">S2 attendee list is partial — full record not available. All S2 entries marked ⚠ Unverified until confirmed.</div>`:''}<div class="sessions-grid">${cards}</div>`;}
init();
