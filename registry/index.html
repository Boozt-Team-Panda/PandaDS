
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Panda DS Registry</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:ital,wght@0,300;0,400;0,500;1,400&family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;1,9..40,300&display=swap" rel="stylesheet">
<style>
:root {
  --black: #0f0f0f;
  --white: #fafaf8;
  --gray-50: #f5f5f3;
  --gray-100: #ebebea;
  --gray-200: #d6d6d4;
  --gray-400: #9e9e9b;
  --gray-600: #5c5c5a;
  --gray-800: #2a2a28;
  --accent: #e8ff47;
  --accent-dark: #c8df00;
  --s1: #bfdbfe;
  --s1-text: #1e3a5f;
  --s2: #fce7f3;
  --s2-text: #6b1a3a;
  --s3: #d1fae5;
  --s3-text: #064e2e;
  --stable: #d1fae5; --stable-t: #064e2e;
  --draft: #fef9c3; --draft-t: #713f12;
  --unverified: #ede9fe; --unverified-t: #3b0764;
  --blocked: #fee2e2; --blocked-t: #7f1d1d;
  --high: #fee2e2; --high-t: #7f1d1d;
  --med: #fef9c3; --med-t: #713f12;
  --low: #d1fae5; --low-t: #064e2e;
  --font-sans: 'DM Sans', sans-serif;
  --font-mono: 'DM Mono', monospace;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: var(--font-sans); background: var(--gray-50); color: var(--black); min-height: 100vh; }

/* LAYOUT */
.shell { display: grid; grid-template-columns: 220px 1fr; grid-template-rows: auto 1fr; min-height: 100vh; }
.header { grid-column: 1 / -1; background: var(--black); color: var(--white); padding: 0 24px; display: flex; align-items: center; justify-content: space-between; height: 52px; }
.header-left { display: flex; align-items: center; gap: 16px; }
.logo { font-family: var(--font-mono); font-size: 13px; font-weight: 500; letter-spacing: 0.04em; color: var(--white); }
.logo span { color: var(--accent); }
.header-meta { font-family: var(--font-mono); font-size: 11px; color: var(--gray-400); }
.gh-btn { font-family: var(--font-mono); font-size: 11px; color: var(--gray-400); text-decoration: none; border: 0.5px solid var(--gray-600); border-radius: 3px; padding: 4px 10px; transition: all 0.15s; }
.gh-btn:hover { color: var(--accent); border-color: var(--accent); }

/* SIDEBAR */
.sidebar { background: var(--black); color: var(--white); padding: 20px 0; border-right: 0px; display: flex; flex-direction: column; gap: 0; position: sticky; top: 52px; height: calc(100vh - 52px); overflow-y: auto; }
.sidebar-section { padding: 0 0 16px; }
.sidebar-label { font-family: var(--font-mono); font-size: 9px; letter-spacing: 0.12em; color: var(--gray-600); padding: 0 20px 8px; text-transform: uppercase; }
.nav-item { display: flex; align-items: center; justify-content: space-between; padding: 7px 20px; cursor: pointer; font-size: 13px; color: var(--gray-400); transition: all 0.1s; border-left: 2px solid transparent; }
.nav-item:hover { color: var(--white); background: rgba(255,255,255,0.04); }
.nav-item.active { color: var(--white); border-left-color: var(--accent); background: rgba(232,255,71,0.06); }
.nav-count { font-family: var(--font-mono); font-size: 10px; color: var(--gray-600); background: var(--gray-800); padding: 1px 6px; border-radius: 99px; }
.nav-item.active .nav-count { background: rgba(232,255,71,0.15); color: var(--accent); }
.sidebar-divider { height: 0.5px; background: var(--gray-800); margin: 8px 20px 16px; }
.session-filter { padding: 0 20px; display: flex; flex-direction: column; gap: 4px; }
.sess-btn { font-family: var(--font-mono); font-size: 11px; padding: 5px 10px; border-radius: 4px; cursor: pointer; border: 0.5px solid transparent; text-align: left; transition: all 0.1s; }
.sess-btn-all { color: var(--gray-400); background: transparent; border-color: var(--gray-800); }
.sess-btn-all:hover, .sess-btn-all.active { color: var(--white); border-color: var(--gray-600); background: var(--gray-800); }
.sess-btn-S1 { color: var(--s1-text); background: rgba(191,219,254,0.12); border-color: rgba(191,219,254,0.2); }
.sess-btn-S1:hover, .sess-btn-S1.active { background: rgba(191,219,254,0.25); border-color: var(--s1); }
.sess-btn-S2 { color: #f9a8d4; background: rgba(252,231,243,0.08); border-color: rgba(252,231,243,0.15); }
.sess-btn-S2:hover, .sess-btn-S2.active { background: rgba(252,231,243,0.18); border-color: #f9a8d4; }
.sess-btn-S3 { color: #6ee7b7; background: rgba(209,250,229,0.08); border-color: rgba(209,250,229,0.15); }
.sess-btn-S3:hover, .sess-btn-S3.active { background: rgba(209,250,229,0.18); border-color: #6ee7b7; }

/* MAIN */
.main { padding: 28px 32px; overflow-y: auto; }
.page-title { font-size: 11px; font-family: var(--font-mono); color: var(--gray-400); letter-spacing: 0.08em; text-transform: uppercase; margin-bottom: 20px; }

/* STATS ROW */
.stats-row { display: grid; grid-template-columns: repeat(4, minmax(0, 1fr)); gap: 12px; margin-bottom: 28px; }
.stat { background: var(--white); border: 0.5px solid var(--gray-200); border-radius: 8px; padding: 16px 20px; }
.stat-num { font-size: 28px; font-weight: 300; font-family: var(--font-mono); line-height: 1; margin-bottom: 4px; }
.stat-label { font-size: 11px; color: var(--gray-400); }
.stat-sub { font-size: 10px; font-family: var(--font-mono); color: var(--gray-400); margin-top: 6px; }
.stat-highlight { background: var(--black); color: var(--white); }
.stat-highlight .stat-label { color: var(--gray-400); }
.stat-highlight .stat-sub { color: var(--gray-600); }
.stat-highlight .stat-num { color: var(--accent); }

/* CARDS */
.cards { display: flex; flex-direction: column; gap: 1px; }
.card { background: var(--white); border: 0.5px solid var(--gray-200); border-radius: 6px; overflow: hidden; transition: border-color 0.15s; margin-bottom: 1px; }
.card:hover { border-color: var(--gray-400); }
.card-header { display: grid; grid-template-columns: 100px 52px 1fr auto; gap: 12px; align-items: start; padding: 14px 16px; cursor: pointer; }
.card-id { font-family: var(--font-mono); font-size: 11px; color: var(--gray-600); font-weight: 500; padding-top: 1px; }
.card-statement { font-size: 13px; line-height: 1.5; font-weight: 400; }
.card-meta { display: flex; gap: 6px; align-items: center; flex-shrink: 0; }
.card-body { padding: 0 16px 14px 164px; border-top: 0.5px solid var(--gray-100); margin-top: 2px; padding-top: 12px; display: none; }
.card-body.open { display: block; }
.card-body-grid { display: grid; grid-template-columns: 100px 1fr; gap: 6px 12px; font-size: 12px; }
.card-body-label { color: var(--gray-400); font-family: var(--font-mono); font-size: 10px; padding-top: 1px; }
.card-body-val { color: var(--gray-800); line-height: 1.5; }
.card-layer { font-size: 11px; color: var(--gray-600); margin-top: 2px; }
.card-expand-hint { font-family: var(--font-mono); font-size: 10px; color: var(--gray-400); margin-top: 10px; }

/* PILLS */
.pill { display: inline-flex; align-items: center; padding: 2px 8px; border-radius: 3px; font-size: 10px; font-family: var(--font-mono); font-weight: 500; white-space: nowrap; }
.pill-stable { background: var(--stable); color: var(--stable-t); }
.pill-draft { background: var(--draft); color: var(--draft-t); }
.pill-unverified { background: var(--unverified); color: var(--unverified-t); }
.pill-blocked { background: var(--blocked); color: var(--blocked-t); }
.pill-unresolved { background: var(--blocked); color: var(--blocked-t); }
.pill-resolved { background: var(--stable); color: var(--stable-t); }
.pill-open { background: var(--gray-100); color: var(--gray-600); }
.pill-high { background: var(--high); color: var(--high-t); }
.pill-med { background: var(--med); color: var(--med-t); }
.pill-low { background: var(--low); color: var(--low-t); }
.pill-S1 { background: var(--s1); color: var(--s1-text); }
.pill-S2 { background: var(--s2); color: var(--s2-text); }
.pill-S3 { background: var(--s3); color: var(--s3-text); }

/* FILTER BAR */
.filter-row { display: flex; gap: 6px; margin-bottom: 16px; flex-wrap: wrap; align-items: center; }
.filter-label { font-size: 11px; color: var(--gray-400); font-family: var(--font-mono); }
.filter-chip { font-family: var(--font-mono); font-size: 10px; padding: 3px 10px; border: 0.5px solid var(--gray-200); border-radius: 3px; cursor: pointer; background: var(--white); color: var(--gray-600); transition: all 0.1s; }
.filter-chip:hover { border-color: var(--gray-400); color: var(--black); }
.filter-chip.active { background: var(--black); color: var(--white); border-color: var(--black); }

/* EMPTY + LOADING */
.empty-state { text-align: center; padding: 48px; color: var(--gray-400); font-size: 13px; font-family: var(--font-mono); }
.loading { text-align: center; padding: 48px; color: var(--gray-400); font-size: 13px; }

/* SESSIONS VIEW */
.session-card { background: var(--white); border: 0.5px solid var(--gray-200); border-radius: 8px; padding: 20px 24px; margin-bottom: 8px; }
.session-card-header { display: flex; align-items: baseline; gap: 12px; margin-bottom: 12px; }
.session-card-title { font-size: 15px; font-weight: 500; }
.session-card-date { font-family: var(--font-mono); font-size: 11px; color: var(--gray-400); }
.session-stats { display: flex; gap: 16px; margin-bottom: 10px; }
.session-stat { font-family: var(--font-mono); font-size: 11px; color: var(--gray-600); }
.session-stat strong { color: var(--black); }
.session-attendees { font-size: 12px; color: var(--gray-600); line-height: 1.6; }
.session-note { font-size: 11px; color: #92400e; background: #fef9c3; border-radius: 4px; padding: 6px 10px; margin-top: 8px; font-family: var(--font-mono); }

/* NOTICE */
.notice { background: #fefce8; border: 0.5px solid #fef08a; border-radius: 6px; padding: 10px 14px; font-size: 12px; color: #854d0e; margin-bottom: 16px; font-family: var(--font-mono); }
</style>
</head>

async function loadData() {
  try {
    const res = await fetch(REGISTRY_URL);
    if (!res.ok) throw new Error();
    DATA = await res.json();
  } catch(e) {
    DATA = FALLBACK;
  }
  init();
}

function init() {
  // Build session filter buttons
  const sf = document.getElementById('session-filter');
  DATA.sessions.forEach(s => {
    const btn = document.createElement('button');
    btn.className = `sess-btn sess-btn-${s.id}`;
    btn.textContent = `${s.id} · ${s.date.slice(0,7)}`;
    btn.onclick = () => setSess(s.id);
    sf.appendChild(btn);
  });
  updateCounts();
  document.getElementById('header-meta').textContent = `v${DATA.meta.version} · ${DATA.meta.lastUpdated} · ${DATA.meta.lastSession}`;
  render();
}

function updateCounts() {
  const f = s => activeSession === 'all' || s === activeSession;
  document.getElementById('cnt-decisions').textContent = DATA.decisions.filter(d=>f(d.session)).length;
  document.getElementById('cnt-open').textContent = DATA.openThreads.filter(d=>f(d.session)).length;
  document.getElementById('cnt-conflicts').textContent = DATA.conflicts.filter(d=>f(d.session)).length;
  document.getElementById('cnt-assumptions').textContent = DATA.assumptions.filter(d=>f(d.session)).length;
  document.getElementById('cnt-deferred').textContent = DATA.deferred.filter(d=>f(d.session)).length;
  document.getElementById('cnt-sessions').textContent = DATA.sessions.length;
}

function pill(cls, label) { return `<span class="pill pill-${cls}">${label}</span>`; }
function statusPill(s) {
  const l={stable:'stable',draft:'draft',unverified:'⚠ unverified',blocked:'blocked',open:'open',unresolved:'unresolved',resolved:'resolved'};
  return pill(s, l[s]||s);
}
function priPill(p) { return pill(p, p); }
function sessPill(s) { return pill(s, s); }

function makeCard(id, session, primary, secondary, meta1, meta2, expandContent) {
  const k = id;
  const exp = expandedCard === k;
  return `<div class="card" id="card-${k}">
    <div class="card-header" onclick="toggleCard('${k}')">
      <div class="card-id">${id}<div class="card-layer" style="margin-top:4px">${secondary||''}</div></div>
      <div style="padding-top:2px">${sessPill(session)}</div>
      <div class="card-statement">${primary}</div>
      <div class="card-meta">${meta1||''}${meta2?'&nbsp;'+meta2:''}</div>
    </div>
    ${exp ? `<div class="card-body open">${expandContent}</div>` : ''}
  </div>`;
}

function bodyGrid(...pairs) {
  const rows = pairs.filter(([,v])=>v).map(([l,v])=>`<div class="card-body-label">${l}</div><div class="card-body-val">${v}</div>`).join('');
  return `<div class="card-body-grid">${rows}</div>`;
}

function renderDecisions() {
  let items = DATA.decisions.filter(d=>activeSession==='all'||d.session===activeSession);
  if (activeFilter!=='all') items = items.filter(d=>d.status===activeFilter);

  const stableCount = items.filter(d=>d.status==='stable').length;
  const unverCount = items.filter(d=>d.status==='unverified').length;

  const statsRow = `<div class="stats-row">
    <div class="stat stat-highlight"><div class="stat-num">${items.length}</div><div class="stat-label">decisions shown</div><div class="stat-sub">${activeSession==='all'?'all sessions':activeSession}</div></div>
    <div class="stat"><div class="stat-num">${stableCount}</div><div class="stat-label">stable</div><div class="stat-sub">locked in</div></div>
    <div class="stat"><div class="stat-num">${items.filter(d=>d.status==='draft').length}</div><div class="stat-label">draft</div><div class="stat-sub">in progress</div></div>
    <div class="stat"><div class="stat-num">${unverCount}</div><div class="stat-label">unverified</div><div class="stat-sub">S2 pending</div></div>
  </div>`;

  const filters = `<div class="filter-row">
    <span class="filter-label">status /</span>
    ${['all','stable','draft','unverified','blocked'].map(f=>`<button class="filter-chip${activeFilter===f?' active':''}" onclick="setFilt('${f}')">${f==='all'?'all':f}</button>`).join('')}
  </div>`;

  if (!items.length) return statsRow + filters + `<div class="empty-state">no decisions match this filter</div>`;

  const cards = items.map(d => makeCard(
    d.id, d.session, d.statement, d.layer,
    statusPill(d.status), '',
    bodyGrid(['context', d.context], ['date', d.date])
  )).join('');

  return statsRow + filters + `<div class="cards">${cards}</div>`;
}

function renderOpen() {
  let items = DATA.openThreads.filter(o=>activeSession==='all'||o.session===activeSession);
  if (activeFilter!=='all') items = items.filter(o=>o.priority===activeFilter);

  const filters = `<div class="filter-row">
    <span class="filter-label">priority /</span>
    ${['all','high','med','low'].map(f=>`<button class="filter-chip${activeFilter===f?' active':''}" onclick="setFilt('${f}')">${f==='all'?'all':f}</button>`).join('')}
  </div>`;

  const cards = items.map(o => makeCard(
    o.id, o.session, o.topic, o.layer,
    priPill(o.priority), statusPill(o.status),
    bodyGrid(['last position', o.lastPosition], ['needs', o.needs], ['blocks', o.blocks])
  )).join('');

  return filters + `<div class="cards">${cards||'<div class="empty-state">no open threads</div>'}</div>`;
}

function renderConflicts() {
  let items = DATA.conflicts.filter(c=>activeSession==='all'||c.session===activeSession);
  const cards = items.map(c => makeCard(
    c.id, c.session, c.topic, '',
    statusPill(c.resolutionStatus), '',
    bodyGrid(
      ['previous', c.previousDecision],
      ['current', c.currentDirection],
      ['if keep old', c.implKeepOld],
      ['if go new', c.implGoNew],
      ['notes', c.notes]
    )
  )).join('');
  return `<div class="cards">${cards||'<div class="empty-state">no conflicts</div>'}</div>`;
}

function renderAssumptions() {
  let items = DATA.assumptions.filter(a=>activeSession==='all'||a.session===activeSession);
  const cards = items.map(a => makeCard(
    a.id, a.session, a.statement, '',
    statusPill(a.status), '',
    bodyGrid(['risk if wrong', a.risk])
  )).join('');
  return `<div class="cards">${cards}</div>`;
}

function renderDeferred() {
  let items = DATA.deferred.filter(d=>activeSession==='all'||d.session===activeSession);
  const cards = items.map(d => makeCard(
    d.id, d.session, d.topic, '',
    '', '',
    bodyGrid(['reason', d.reason], ['revisit when', d.revisit])
  )).join('');
  return `<div class="cards">${cards}</div>`;
}

function renderSessions() {
  return DATA.sessions.map(s => `
    <div class="session-card">
      <div class="session-card-header">
        ${sessPill(s.id)}
        <div class="session-card-title">${s.topic}</div>
        <div class="session-card-date">${s.date}</div>
      </div>
      <div class="session-stats">
        <div class="session-stat"><strong>${s.decisions}</strong> decisions</div>
        <div class="session-stat"><strong>${s.openThreads}</strong> open</div>
        <div class="session-stat"><strong>${s.conflicts}</strong> conflicts</div>
        ${s.assumptions ? `<div class="session-stat"><strong>${s.assumptions}</strong> assumptions</div>` : ''}
      </div>
      <div class="session-attendees">${s.attendees.join(' · ')}</div>
      ${s.notes ? `<div class="session-note">⚠ ${s.notes}</div>` : ''}
    </div>`).join('');
}

function render() {
  document.getElementById('main').innerHTML =
    `<div class="page-title">${activeTab}${activeSession!=='all'?' / '+activeSession:''}</div>` +
    ({decisions:renderDecisions,open:renderOpen,conflicts:renderConflicts,assumptions:renderAssumptions,deferred:renderDeferred,sessions:renderSessions}[activeTab]||renderDecisions)();
  updateCounts();
}
