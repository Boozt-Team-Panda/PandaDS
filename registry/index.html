
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@300;400;500&family=Instrument+Sans:ital,wght@0,400;0,500;0,600;1,400&display=swap" rel="stylesheet">
<style>
:root{--bg:#f4f3f0;--surface:#fff;--border:#e2e0d8;--border-strong:#bfbdb4;--text:#1c1b18;--text-2:#6b6860;--text-3:#a09d95;--max-w:980px;--stable-bg:#e6f4ea;--stable-fg:#1a5c2a;--draft-bg:#fef8e1;--draft-fg:#6b4c10;--tbd-bg:#f0efec;--tbd-fg:#7a7770;--unverified-bg:#f0ebfb;--unverified-fg:#4c2080;--blocked-bg:#fce8ec;--blocked-fg:#8c1a2e;--high-bg:#fce8ec;--high-fg:#8c1a2e;--med-bg:#fef8e1;--med-fg:#6b4c10;--low-bg:#e6f4ea;--low-fg:#1a5c2a;--unresolved-bg:#fce8ec;--unresolved-fg:#8c1a2e;--resolved-bg:#e6f4ea;--resolved-fg:#1a5c2a;--design-bg:#e8f0fe;--design-fg:#1a3c8c;--dev-bg:#e8f8f0;--dev-fg:#1a5c3a;--both-bg:#f4f3f0;--both-fg:#5c5a55;--font:\'Instrument Sans\',sans-serif;--mono:\'DM Mono\',monospace;--r:7px}
*{box-sizing:border-box;margin:0;padding:0;-webkit-font-smoothing:antialiased}
body{font-family:var(--font);background:var(--bg);color:var(--text);font-size:14px;line-height:1.5}
.header{background:var(--text);color:#fff;position:sticky;top:0;z-index:100;border-bottom:1px solid rgba(255,255,255,.06)}
.header-inner{max-width:var(--max-w);margin:0 auto;height:50px;display:flex;align-items:center;justify-content:space-between;padding:0 24px}
.logo{font-family:var(--mono);font-size:12px;font-weight:500;letter-spacing:.06em;color:#fff}
.logo-dim{color:rgba(255,255,255,.28);margin:0 5px}
.header-r{display:flex;align-items:center;gap:18px}
.header-meta{font-family:var(--mono);font-size:11px;color:rgba(255,255,255,.3)}
.gh{font-family:var(--mono);font-size:11px;color:rgba(255,255,255,.45);text-decoration:none;border:1px solid rgba(255,255,255,.15);border-radius:4px;padding:3px 9px;transition:all .15s}
.gh:hover{color:#fff;border-color:rgba(255,255,255,.4)}
.wrap{max-width:var(--max-w);margin:0 auto;padding:0 24px 64px;display:grid;grid-template-columns:196px 1fr;gap:0 28px;align-items:start}
/* SIDEBAR */
.sidebar{padding:24px 0;position:sticky;top:50px;max-height:calc(100vh - 50px);overflow-y:auto}
.nav-group{margin-bottom:4px}
.nav-group-hd{font-family:var(--mono);font-size:9px;letter-spacing:.14em;text-transform:uppercase;color:var(--text-3);padding:16px 8px 6px;display:flex;align-items:center;justify-content:space-between}
.nav-group-hd:first-child{padding-top:4px}
.nav-item{display:flex;align-items:center;justify-content:space-between;padding:6px 8px;border-radius:5px;cursor:pointer;font-size:13px;color:var(--text-2);border:1px solid transparent;margin-bottom:1px;transition:all .1s;user-select:none}
.nav-item:hover{background:var(--surface);color:var(--text)}
.nav-item.active{background:var(--surface);color:var(--text);font-weight:500;border-color:var(--border)}
.nav-sub{padding-left:12px}
.nav-sub .nav-item{font-size:12px;padding:5px 8px}
.nav-count{font-family:var(--mono);font-size:10px;color:var(--text-3);background:var(--bg);padding:1px 6px;border-radius:99px;border:1px solid var(--border)}
.nav-item.active .nav-count{color:var(--text-2)}
.nav-divider{height:1px;background:var(--border);margin:6px 8px}
.sess-list{padding:0 8px;display:flex;flex-direction:column;gap:2px}
.sess-btn{font-family:var(--mono);font-size:11px;padding:5px 8px;border-radius:5px;cursor:pointer;border:1px solid transparent;text-align:left;color:var(--text-2);background:transparent;transition:all .1s;display:flex;justify-content:space-between;align-items:center;width:100%}
.sess-btn:hover{background:var(--surface);color:var(--text)}
.sess-btn.active{background:var(--surface);color:var(--text);font-weight:500;border-color:var(--border)}
.sess-date{font-size:10px;color:var(--text-3);font-weight:400}
/* MAIN */
.main{padding:24px 0;min-width:0}
.view-eyebrow{font-family:var(--mono);font-size:10px;letter-spacing:.08em;text-transform:uppercase;color:var(--text-3);margin-bottom:16px}
/* STATS */
.stat-row{display:grid;grid-template-columns:repeat(4,minmax(0,1fr));gap:10px;margin-bottom:20px}
.stat{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);padding:14px 16px}
.stat.dark{background:var(--text);border-color:var(--text);color:#fff}
.stat-n{font-family:var(--mono);font-size:24px;font-weight:300;line-height:1;margin-bottom:3px}
.stat.dark .stat-n{color:#fff}
.stat-l{font-size:11px;color:var(--text-3)}
.stat.dark .stat-l{color:rgba(255,255,255,.35)}
.stat-s{font-family:var(--mono);font-size:10px;color:var(--text-3);margin-top:5px}
.stat.dark .stat-s{color:rgba(255,255,255,.2)}
/* FILTER */
.filter-row{display:flex;align-items:center;gap:6px;margin-bottom:14px;flex-wrap:wrap}
.fl{font-family:var(--mono);font-size:10px;color:var(--text-3)}
.chip{font-family:var(--mono);font-size:10px;padding:3px 9px;border:1px solid var(--border);border-radius:99px;cursor:pointer;background:var(--surface);color:var(--text-2);transition:all .1s}
.chip:hover{border-color:var(--border-strong);color:var(--text)}
.chip.active{background:var(--text);color:#fff;border-color:var(--text)}
/* CARDS */
.cards{display:flex;flex-direction:column;gap:5px}
.card{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);overflow:hidden;transition:border-color .12s}
.card:hover{border-color:var(--border-strong)}
.card-row{display:grid;grid-template-columns:104px 1fr auto;gap:14px;padding:13px 16px;cursor:pointer;align-items:start}
.card-id-col{display:flex;flex-direction:column;gap:4px}
.cid{font-family:var(--mono);font-size:11px;font-weight:500;color:var(--text)}
.csess{font-family:var(--mono);font-size:10px;color:var(--text-3)}
.clayer{font-family:var(--mono);font-size:10px;color:var(--text-3);margin-top:1px}
.cstmt{font-size:13px;line-height:1.55}
.cpills{display:flex;gap:5px;flex-wrap:wrap;flex-shrink:0;padding-top:1px}
.card-body{background:var(--bg);border-top:1px solid var(--border);padding:12px 16px 12px calc(104px + 14px + 16px);display:none}
.card-body.open{display:block}
.body-grid{display:grid;grid-template-columns:90px 1fr;gap:6px 10px;font-size:12px}
.bk{font-family:var(--mono);font-size:10px;color:var(--text-3);padding-top:2px}
.bv{color:var(--text-2);line-height:1.55}
/* PILLS */
.pill{display:inline-flex;align-items:center;font-family:var(--mono);font-size:10px;padding:2px 7px;border-radius:3px;font-weight:500;white-space:nowrap}
.p-stable{background:var(--stable-bg);color:var(--stable-fg)}
.p-draft{background:var(--draft-bg);color:var(--draft-fg)}
.p-tbd{background:var(--tbd-bg);color:var(--tbd-fg)}
.p-unverified{background:var(--unverified-bg);color:var(--unverified-fg)}
.p-blocked{background:var(--blocked-bg);color:var(--blocked-fg)}
.p-high{background:var(--high-bg);color:var(--high-fg)}
.p-med{background:var(--med-bg);color:var(--med-fg)}
.p-low{background:var(--low-bg);color:var(--low-fg)}
.p-unresolved{background:var(--unresolved-bg);color:var(--unresolved-fg)}
.p-resolved{background:var(--resolved-bg);color:var(--resolved-fg)}
.p-open{background:var(--tbd-bg);color:var(--tbd-fg)}
.p-design{background:var(--design-bg);color:var(--design-fg)}
.p-dev{background:var(--dev-bg);color:var(--dev-fg)}
.p-both{background:var(--both-bg);color:var(--both-fg);border:1px solid var(--border)}
/* SESSIONS VIEW */
.sess-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);padding:20px 22px;margin-bottom:8px}
.sess-head{display:flex;align-items:baseline;gap:10px;margin-bottom:12px}
.sess-id{font-family:var(--mono);font-size:11px;color:var(--text-3)}
.sess-topic{font-size:15px;font-weight:600}
.sess-date{font-family:var(--mono);font-size:11px;color:var(--text-3);margin-left:auto}
.sess-counts{display:flex;gap:20px;padding-bottom:12px;margin-bottom:12px;border-bottom:1px solid var(--border)}
.sess-count{font-size:12px;color:var(--text-2)}
.sess-count strong{font-family:var(--mono);font-size:20px;font-weight:300;color:var(--text);display:block;line-height:1.1;margin-bottom:1px}
.sess-attendees{font-size:12px;color:var(--text-3);line-height:1.7}
.sess-note{font-family:var(--mono);font-size:11px;color:var(--draft-fg);background:var(--draft-bg);border-radius:5px;padding:7px 10px;margin-top:10px}
/* ADOPTION MATRIX */
.matrix-wrap{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);overflow:hidden}
.matrix-table{width:100%;border-collapse:collapse}
.matrix-table th{font-family:var(--mono);font-size:10px;letter-spacing:.08em;text-transform:uppercase;color:var(--text-3);padding:10px 16px;border-bottom:1px solid var(--border);text-align:left;background:var(--bg)}
.matrix-table th:not(:first-child){text-align:center;width:90px}
.matrix-table td{padding:8px 16px;border-bottom:1px solid var(--border);font-size:12px;vertical-align:middle}
.matrix-table td:not(:first-child){text-align:center;width:90px}
.matrix-table tr:last-child td{border-bottom:none}
.matrix-table tr:hover td{background:var(--bg)}
.matrix-group{font-family:var(--mono);font-size:9px;letter-spacing:.1em;text-transform:uppercase;color:var(--text-3);padding:12px 16px 4px;background:var(--bg);border-bottom:1px solid var(--border)}
.matrix-label{color:var(--text-2);font-size:12px}
.matrix-sub{color:var(--text-3);font-size:11px;font-family:var(--mono)}
.matrix-empty{text-align:center;padding:32px;color:var(--text-3);font-family:var(--mono);font-size:11px}
/* SPEC TOKENS */
.spec-table{width:100%;border-collapse:collapse;background:var(--surface);border:1px solid var(--border);border-radius:var(--r);overflow:hidden}
.spec-table th{font-family:var(--mono);font-size:10px;letter-spacing:.07em;text-transform:uppercase;color:var(--text-3);padding:9px 14px;border-bottom:1px solid var(--border);text-align:left;background:var(--bg)}
.spec-table td{padding:9px 14px;border-bottom:1px solid var(--border);font-size:12px;vertical-align:middle}
.spec-table tr:last-child td{border-bottom:none}
.spec-table tr:hover td{background:var(--bg)}
.tok-name{font-family:var(--mono);font-size:11px;font-weight:500;color:var(--text)}
.tok-val{font-family:var(--mono);font-size:11px;color:var(--text-2)}
.tok-alias{font-family:var(--mono);font-size:10px;color:var(--text-3)}
.tok-desc{font-size:11px;color:var(--text-2);line-height:1.4}
.lay-group{font-family:var(--mono);font-size:9px;letter-spacing:.1em;text-transform:uppercase;color:var(--text-3);padding:10px 14px 4px;background:var(--bg);border-bottom:1px solid var(--border);border-top:1px solid var(--border)}
/* NOTICE + EMPTY */
.notice{font-family:var(--mono);font-size:11px;color:var(--draft-fg);background:var(--draft-bg);border-radius:6px;padding:9px 12px;margin-bottom:14px}
.empty{text-align:center;padding:48px 24px;font-family:var(--mono);font-size:12px;color:var(--text-3)}
.empty strong{display:block;font-size:14px;color:var(--text-2);margin-bottom:6px;font-family:var(--font);font-weight:500}
</style>
</head>

let view='sessions',sub='all',sessF='all',statusF='all',expanded=null;

function pill(cls,text){return`<span class="pill p-${cls}">${text}</span>`}
function sPill(s){const l={stable:'stable',draft:'draft',tbd:'tbd',unverified:'⚠ unverified',blocked:'blocked',open:'open',unresolved:'unresolved',resolved:'resolved'};return pill(s,l[s]||s)}
function pPill(p){return pill(p,p)}
function audPill(a){const l={design:'design',dev:'dev',both:'both'};return pill(a,l[a]||a)}
function platPill(s){return`<span class="pill p-${s||'tbd'}" style="font-size:9px">${s||'—'}</span>`}

function fSess(arr){return arr.filter(x=>sessF==='all'||x.session===sessF)}

function updateCounts(){
  const fd=fSess(D.decisions);
  document.getElementById('cnt-s').textContent=D.sessions.length;
  document.getElementById('cnt-d').textContent=fd.length;
  document.getElementById('cnt-d-des').textContent=fd.filter(x=>x.audience==='design').length;
  document.getElementById('cnt-d-dev').textContent=fd.filter(x=>x.audience==='dev').length;
  document.getElementById('cnt-d-both').textContent=fd.filter(x=>x.audience==='both').length;
  document.getElementById('cnt-opn').textContent=fSess(D.openThreads).length;
  document.getElementById('cnt-cfx').textContent=fSess(D.conflicts).length;
  document.getElementById('cnt-asm').textContent=fSess(D.assumptions).length;
  document.getElementById('cnt-def').textContent=fSess(D.deferred).length;
  document.getElementById('cnt-tok').textContent=D.designSystem.tokens.length;
  document.getElementById('cnt-cmp').textContent=D.designSystem.components.length;
  document.getElementById('cnt-pat').textContent=D.designSystem.patterns.length;
  document.getElementById('cnt-tpl').textContent=D.designSystem.templates.length;
}

function card(id,sess,layer,primary,pills,rows){
  const k=id,open=expanded===k;
  const body=rows.filter(([,v])=>v).map(([l,v])=>`<div class="bk">${l}</div><div class="bv">${v}</div>`).join('');
  return`<div class="card">
    <div class="card-row" onclick="toggleCard('${k}')">
      <div class="card-id-col"><div class="cid">${id}</div><div class="csess">${sess}</div>${layer?`<div class="clayer">${layer}</div>`:''}</div>
      <div class="cstmt">${primary}</div>
      <div class="cpills">${pills}</div>
    </div>
    <div class="card-body${open?' open':''}"><div class="body-grid">${body}</div></div>
  </div>`
}

function filterRow(opts,field){
  return`<div class="filter-row"><span class="fl">filter /</span>${opts.map(o=>`<button class="chip${statusF===o?' active':''}" onclick="setF('${o}')">${o==='all'?'all':o}</button>`).join('')}</div>`
}

function statRow(items,label,extraStats){
  const s=`<div class="stat-row">
    <div class="stat dark"><div class="stat-n">${items.length}</div><div class="stat-l">${label}</div><div class="stat-s">${sessF==='all'?'all sessions':sessF}</div></div>
    ${extraStats}
  </div>`;return s;
}

function renderSessions(){
  const cards=D.sessions.map(s=>`<div class="sess-card">
    <div class="sess-head"><span class="sess-id">${s.id}</span><span class="sess-topic">${s.topic}</span><span class="sess-date">${s.date}</span></div>
    <div class="sess-counts">
      <div class="sess-count"><strong>${s.decisions}</strong>decisions</div>
      <div class="sess-count"><strong>${s.openThreads}</strong>open</div>
      <div class="sess-count"><strong>${s.conflicts}</strong>conflicts</div>
      ${s.assumptions?`<div class="sess-count"><strong>${s.assumptions}</strong>assumptions</div>`:''}
      ${s.deferred?`<div class="sess-count"><strong>${s.deferred}</strong>deferred</div>`:''}
    </div>
    <div class="sess-attendees">${s.attendees.join(' · ')}</div>
    ${s.notes?`<div class="sess-note">⚠ ${s.notes}</div>`:''}
  </div>`).join('');
  return cards;
}

function renderDecisions(){
  let items=fSess(D.decisions);
  if(sub!=='all') items=items.filter(d=>d.audience===sub);
  if(statusF!=='all') items=items.filter(d=>d.status===statusF);
  const st=statRow(items,'decisions',`
    <div class="stat"><div class="stat-n">${items.filter(d=>d.audience==='design').length}</div><div class="stat-l">design</div><div class="stat-s">design-owned</div></div>
    <div class="stat"><div class="stat-n">${items.filter(d=>d.audience==='dev').length}</div><div class="stat-l">dev</div><div class="stat-s">dev-owned</div></div>
    <div class="stat"><div class="stat-n">${items.filter(d=>d.audience==='both').length}</div><div class="stat-l">both</div><div class="stat-s">shared</div></div>`);
  const fr=filterRow(['all','stable','draft','unverified','blocked']);
  if(!items.length) return st+fr+`<div class="empty">No decisions match this filter.</div>`;
  const cards=items.map(d=>card(d.id,d.session,d.layer,d.statement,sPill(d.status)+' '+audPill(d.audience),[['context',d.context],['date',d.date]])).join('');
  return st+fr+`<div class="cards">${cards}</div>`;
}

function renderOpen(){
  let items=fSess(D.openThreads);
  if(statusF!=='all') items=items.filter(o=>o.priority===statusF);
  const st=statRow(items,'open threads',`
    <div class="stat"><div class="stat-n">${items.filter(o=>o.priority==='high').length}</div><div class="stat-l">high priority</div><div class="stat-s">need attention</div></div>
    <div class="stat"><div class="stat-n">${items.filter(o=>o.priority==='med').length}</div><div class="stat-l">medium</div><div class="stat-s"></div></div>
    <div class="stat"><div class="stat-n">${items.filter(o=>o.priority==='low').length}</div><div class="stat-l">low</div><div class="stat-s"></div></div>`);
  const fr=filterRow(['all','high','med','low']);
  const cards=items.map(o=>card(o.id,o.session,o.layer,o.topic,pPill(o.priority)+' '+sPill(o.status),[['last position',o.lastPosition],['needs',o.needs],['blocks',o.blocks]])).join('');
  return st+fr+`<div class="cards">${cards||'<div class="empty">No open threads.</div>'}</div>`;
}

function renderConflicts(){
  const items=fSess(D.conflicts);
  if(!items.length) return`<div class="empty"><strong>No conflicts detected</strong>Across ${sessF==='all'?'all sessions':sessF}</div>`;
  const cards=items.map(c=>card(c.id,c.session,'',c.topic,sPill(c.resolutionStatus),[['previous',c.previousDecision],['current',c.currentDirection],['if keep old',c.implKeepOld],['if go new',c.implGoNew],['notes',c.notes]])).join('');
  return`<div class="cards">${cards}</div>`;
}

function renderAssumptions(){
  const items=fSess(D.assumptions);
  const cards=items.map(a=>card(a.id,a.session,'',a.statement,sPill(a.status),[['risk if wrong',a.risk]])).join('');
  return`<div class="cards">${cards||'<div class="empty">No assumptions logged.</div>'}</div>`;
}

function renderDeferred(){
  const items=fSess(D.deferred);
  const cards=items.map(d=>card(d.id,d.session,'',d.topic,'',  [['reason',d.reason],['revisit when',d.revisit]])).join('');
  return`<div class="cards">${cards||'<div class="empty">No deferred items.</div>'}</div>`;
}

function renderAdoption(){
  const toks=D.designSystem.tokens;
  const cats={};
  toks.forEach(t=>{if(!cats[t.category])cats[t.category]=[];cats[t.category].push(t)});
  
  function aggStatus(items,platform){
    const statuses=items.map(i=>i.platforms[platform]);
    if(statuses.every(s=>s==='stable')) return'stable';
    if(statuses.some(s=>s==='stable')) return'draft';
    if(statuses.some(s=>s==='draft')) return'draft';
    return'tbd';
  }

  const layerGroups={};
  toks.forEach(t=>{
    const key=t.category+'/'+t.layer;
    if(!layerGroups[key])layerGroups[key]={category:t.category,layer:t.layer,items:[]};
    layerGroups[key].items.push(t);
  });

  const rows=Object.values(layerGroups).map(g=>`
    <tr>
      <td><div class="matrix-label">${g.category}</div><div class="matrix-sub">${g.layer} · ${g.items.length} token${g.items.length>1?'s':''}</div></td>
      <td>${platPill(aggStatus(g.items,'web'))}</td>
      <td>${platPill(aggStatus(g.items,'ios'))}</td>
      <td>${platPill(aggStatus(g.items,'android'))}</td>
    </tr>`).join('');

  const dsLayers=['Components','Patterns','Templates'];
  const emptyRows=dsLayers.map(l=>{
    const count=D.designSystem[l.toLowerCase()].length;
    return`<tr>
      <td><div class="matrix-label">${l}</div><div class="matrix-sub">${count} defined</div></td>
      <td><span class="pill p-tbd" style="font-size:9px">—</span></td>
      <td><span class="pill p-tbd" style="font-size:9px">—</span></td>
      <td><span class="pill p-tbd" style="font-size:9px">—</span></td>
    </tr>`;}).join('');

  return`
    <div class="stat-row">
      <div class="stat dark"><div class="stat-n">${toks.filter(t=>t.status==='stable').length}</div><div class="stat-l">stable tokens</div><div class="stat-s">locked in</div></div>
      <div class="stat"><div class="stat-n">${toks.filter(t=>t.status==='draft').length}</div><div class="stat-l">draft</div><div class="stat-s">in progress</div></div>
      <div class="stat"><div class="stat-n">${toks.filter(t=>t.status==='tbd').length}</div><div class="stat-l">TBD</div><div class="stat-s">not started</div></div>
      <div class="stat"><div class="stat-n">${D.designSystem.components.length}</div><div class="stat-l">components</div><div class="stat-s">defined</div></div>
    </div>
    <div class="matrix-wrap">
      <table class="matrix-table">
        <thead><tr>
          <th>DS element</th>
          <th>Web</th>
          <th>iOS</th>
          <th>Android</th>
        </tr></thead>
        <tbody>
          <tr><td colspan="4" class="matrix-group">Tokens</td></tr>
          ${rows}
          <tr><td colspan="4" class="matrix-group">Components · Patterns · Templates</td></tr>
          ${emptyRows}
        </tbody>
      </table>
    </div>`;
}

function renderTokens(){
  const toks=D.designSystem.tokens;
  const byLayer={primitive:[],semantic:[],component:[]};
  toks.forEach(t=>{if(byLayer[t.layer])byLayer[t.layer].push(t);else byLayer.primitive.push(t)});
  
  function layerRows(items){
    return items.map(t=>`<tr>
      <td><div class="tok-name">${t.name}</div></td>
      <td><div class="tok-val">${t.value}</div></td>
      <td><div class="tok-alias">${t.alias||'—'}</div></td>
      <td>${sPill(t.status)}</td>
      <td>${platPill(t.platforms.web)}</td>
      <td>${platPill(t.platforms.ios)}</td>
      <td>${platPill(t.platforms.android)}</td>
      <td><div class="tok-desc">${t.description}</div></td>
    </tr>`).join('');
  }

  return`<table class="spec-table">
    <thead><tr>
      <th style="width:200px">Token name</th>
      <th style="width:70px">Value</th>
      <th style="width:120px">Alias</th>
      <th style="width:85px">Status</th>
      <th style="width:60px">Web</th>
      <th style="width:55px">iOS</th>
      <th style="width:75px">Android</th>
      <th>Description</th>
    </tr></thead>
    <tbody>
      <tr><td colspan="8" class="lay-group">Primitive layer (reference)</td></tr>
      ${layerRows(byLayer.primitive)}
      <tr><td colspan="8" class="lay-group">Semantic layer (system)</td></tr>
      ${layerRows(byLayer.semantic)}
      ${byLayer.component.length?`<tr><td colspan="8" class="lay-group">Component layer</td></tr>${layerRows(byLayer.component)}`:''}
    </tbody>
  </table>`;
}

function renderEmpty(label){
  return`<div class="empty"><strong>No ${label} defined yet</strong>They will appear here once discussed and documented in a session.</div>`;
}

function render(){
  updateCounts();
  const eyebrow=`<div class="view-eyebrow">${view}${sub!=='all'?' / '+sub:''}${sessF!=='all'?' / '+sessF:''}</div>`;
  const map={sessions:renderSessions,decisions:renderDecisions,open:renderOpen,conflicts:renderConflicts,assumptions:renderAssumptions,deferred:renderDeferred,adoption:renderAdoption,tokens:renderTokens,components:()=>renderEmpty('components'),patterns:()=>renderEmpty('patterns'),templates:()=>renderEmpty('templates')};
  document.getElementById('main').innerHTML=eyebrow+(map[view]||renderSessions)();
}

function toggleCard(k){expanded=expanded===k?null:k;render()}
function setF(f){statusF=f;expanded=null;render()}

function nav(el,v,s){
  view=v;sub=s;statusF='all';expanded=null;
  document.querySelectorAll('.nav-item').forEach(n=>n.classList.remove('active'));
  el.classList.add('active');
  render();
}

function init(){
  document.getElementById('hmeta').textContent=`v${D.meta.version} · ${D.meta.lastUpdated} · ${D.meta.lastSession}`;
  const sl=document.getElementById('sess-list');
  D.sessions.forEach(s=>{
    const b=document.createElement('button');
    b.className='sess-btn';b.dataset.sess=s.id;
    b.innerHTML=`${s.id}<span class="sess-date">${s.date.slice(0,7)}</span>`;
    b.onclick=()=>{
      sessF=sessF===s.id?'all':s.id;
      document.querySelectorAll('.sess-btn').forEach(x=>x.classList.toggle('active',x.dataset.sess===sessF));
      expanded=null;render();
    };
    sl.appendChild(b);
  });
  render();
}
init();
</script>
</body>
</html>
